<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 620" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d6efd"/>
      <stop offset="100%" stop-color="#1a6b5a"/>
    </linearGradient>
    <linearGradient id="bus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#fd7e14"/>
    </linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="620" rx="16" fill="#f8faff"/>
  <rect x="20" y="16" width="400" height="44" rx="10" fill="url(#hdr)"/>
  <text x="220" y="44" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">Однолінійна схема ВЕС «Приазовська» 150 МВт</text>

  <!-- Wind turbines block -->
  <rect x="100" y="80" width="240" height="54" rx="10" fill="#e8f5e9" stroke="#1a6b5a" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Turbine icons -->
  <g transform="translate(120,90)" fill="#1a6b5a">
    <line x1="8" y1="34" x2="8" y2="12" stroke="#1a6b5a" stroke-width="2"/>
    <line x1="8" y1="12" x2="0" y2="24" stroke="#1a6b5a" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="16" y2="24" stroke="#1a6b5a" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="8" y2="0" stroke="#1a6b5a" stroke-width="1.5"/>
  </g>
  <g transform="translate(144,90)" fill="#1a6b5a">
    <line x1="8" y1="34" x2="8" y2="12" stroke="#1a6b5a" stroke-width="2"/>
    <line x1="8" y1="12" x2="0" y2="24" stroke="#1a6b5a" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="16" y2="24" stroke="#1a6b5a" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="8" y2="0" stroke="#1a6b5a" stroke-width="1.5"/>
  </g>
  <g transform="translate(168,90)" fill="#1a6b5a">
    <line x1="8" y1="34" x2="8" y2="12" stroke="#1a6b5a" stroke-width="2"/>
    <line x1="8" y1="12" x2="0" y2="24" stroke="#1a6b5a" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="16" y2="24" stroke="#1a6b5a" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="8" y2="0" stroke="#1a6b5a" stroke-width="1.5"/>
  </g>
  <text x="260" y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1a6b5a">50 x Vestas V117</text>
  <text x="260" y="118" text-anchor="middle" font-size="11" fill="#555">3 МВт кожна</text>

  <!-- Vertical line -->
  <line x1="220" y1="134" x2="220" y2="160" stroke="#1e2d3d" stroke-width="2"/>

  <!-- Generator block -->
  <rect x="130" y="160" width="180" height="42" rx="8" fill="#fff" stroke="#0d6efd" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="155" cy="181" r="12" fill="none" stroke="#28a745" stroke-width="2"/>
  <text x="155" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#28a745">G</text>
  <text x="240" y="177" text-anchor="middle" font-size="12" font-weight="600" fill="#1e2d3d">Генератор</text>
  <text x="240" y="193" text-anchor="middle" font-size="11" fill="#0d6efd" font-weight="600">0,69 кВ</text>

  <!-- Vertical line -->
  <line x1="220" y1="202" x2="220" y2="228" stroke="#1e2d3d" stroke-width="2"/>

  <!-- Transformer block -->
  <rect x="110" y="228" width="220" height="50" rx="8" fill="#fff" stroke="#17a2b8" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Transformer symbol: two circles -->
  <circle cx="142" cy="253" r="11" fill="none" stroke="#17a2b8" stroke-width="2"/>
  <circle cx="158" cy="253" r="11" fill="none" stroke="#17a2b8" stroke-width="2"/>
  <text x="245" y="249" text-anchor="middle" font-size="12" font-weight="600" fill="#1e2d3d">Трансформатор</text>
  <text x="245" y="265" text-anchor="middle" font-size="11" fill="#17a2b8" font-weight="600">0,69 / 35 кВ (50 шт)</text>

  <!-- Vertical line -->
  <line x1="220" y1="278" x2="220" y2="304" stroke="#1e2d3d" stroke-width="2"/>

  <!-- 35 kV Bus bar -->
  <rect x="60" y="304" width="320" height="36" rx="6" fill="url(#bus)" filter="url(#sh)"/>
  <text x="220" y="327" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Кабельна мережа 35 кВ</text>

  <!-- Vertical line -->
  <line x1="220" y1="340" x2="220" y2="366" stroke="#1e2d3d" stroke-width="2"/>

  <!-- Substation block -->
  <rect x="90" y="366" width="260" height="50" rx="8" fill="#fff" stroke="#dc3545" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="108" y="380" width="22" height="22" rx="3" fill="none" stroke="#dc3545" stroke-width="2"/>
  <line x1="112" y1="384" x2="126" y2="398" stroke="#dc3545" stroke-width="1.5"/>
  <line x1="126" y1="384" x2="112" y2="398" stroke="#dc3545" stroke-width="1.5"/>
  <text x="245" y="387" text-anchor="middle" font-size="12" font-weight="600" fill="#1e2d3d">ПС «Приазовська-35»</text>
  <text x="245" y="403" text-anchor="middle" font-size="11" fill="#dc3545" font-weight="600">35/110 кВ</text>

  <!-- Vertical line -->
  <line x1="220" y1="416" x2="220" y2="442" stroke="#1e2d3d" stroke-width="2"/>

  <!-- 110 kV Bus bar -->
  <rect x="60" y="442" width="320" height="36" rx="6" fill="url(#hdr)" filter="url(#sh)"/>
  <text x="220" y="465" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Шина 110 кВ</text>

  <!-- Vertical line -->
  <line x1="220" y1="478" x2="220" y2="504" stroke="#1e2d3d" stroke-width="2"/>

  <!-- Grid connection -->
  <rect x="90" y="504" width="260" height="50" rx="8" fill="#f3e5f5" stroke="#6f42c1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="220" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#1e2d3d">Приєднання до ОЕС України</text>
  <text x="220" y="543" text-anchor="middle" font-size="11" fill="#6f42c1" font-weight="600">110 кВ · Об'єднана енергосистема</text>

  <!-- Legend -->
  <text x="220" y="582" text-anchor="middle" font-size="10" fill="#999">Однолінійна електрична схема · ВЕС «Приазовська» · Варіант 15</text>

  <!-- Arrows on vertical lines -->
  <polygon points="216,158 220,164 224,158" fill="#1e2d3d"/>
  <polygon points="216,226 220,232 224,226" fill="#1e2d3d"/>
  <polygon points="216,302 220,308 224,302" fill="#1e2d3d"/>
  <polygon points="216,364 220,370 224,364" fill="#1e2d3d"/>
  <polygon points="216,440 220,446 224,440" fill="#1e2d3d"/>
  <polygon points="216,502 220,508 224,502" fill="#1e2d3d"/>
</svg>